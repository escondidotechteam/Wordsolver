<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Sprint + Editor</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; overflow: hidden; }
        canvas { display: block; margin: 10px auto; background: #000; border: 2px solid #444; }
        .menu { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; padding: 10px; }
        button { padding: 8px 12px; cursor: pointer; background: #333; color: white; border: 1px solid #555; border-radius: 4px; font-size: 13px; }
        button.active { background: #2ecc71; border-color: #fff; }
        .controls-hint { font-size: 12px; color: #aaa; margin-bottom: 5px; }
        input { background: #222; color: #2ecc71; border: 1px solid #444; padding: 5px; width: 150px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="controls-hint" id="hint">Mode: Playing | Space: Jump | R: Restart | B: Back Checkpoint | T: Pause</div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    
    <div class="menu">
        <button onclick="toggleMode()" id="modeBtn">Switch to Editor</button>
        <button onclick="resetLevel()" style="background:#e74c3c">Clear All</button>
        <input type="text" id="levelCode" placeholder="Paste Code Here">
        <button onclick="importLevel()">Load</button>
        <button onclick="exportLevel()">Copy Code</button>
        <a href="index.html" style="color:#aaa; text-decoration:none; padding-top:8px;">Exit</a>
    </div>

    <div id="editor-tools" style="display:none;" class="menu">
        <button class="tool active" onclick="setTool('platform', this)">Block</button>
        <button class="tool" onclick="setTool('spike', this)">Spike</button>
        <button class="tool" onclick="setTool('spikepit', this)">Spikepit</button>
        <button class="tool" onclick="setTool('pad', this)">Pad</button>
        <button class="tool" onclick="setTool('checkpoint', this)">Checkpt</button>
        <span style="font-size:11px; color:#888; align-self:center;">Shift+WASD: Move Block | P: Color Block | Arrows: Expand | Ctrl+Arrows: Shrink</span>
    </div>

        const ctx = cvs.getContext('2d');

        let isEditor = false;
        let isPaused = false;
        let currentTool = 'platform';
        let map = [];
        let selectedObj = null;
        let cameraX = 0;
        let keys = {};

        let player = { 
            x: 50, y: 300, w: 30, h: 30, vy: 0, 
            gravity: 0.7, jump: -11, rotation: 0,
            dead: false, spawnX: 50, spawnY: 300, 
            checkpoints: [{x: 50, y: 300}] 
        };

        const urlParams = new URLSearchParams(window.location.search);
        const sharedLevelData = urlParams.get('level');

        if (sharedLevelData) {
            try {
                map = JSON.parse(atob(decodeURIComponent(sharedLevelData)));
                console.log("Custom level loaded successfully!");
            } catch (e) {
                console.error("Error loading shared level data:", e);
                loadStarterMap();
            }
        } else {
            loadStarterMap();
        }

        function loadStarterMap() {
            if (STARTER_MAP) {
                try { map = JSON.parse(atob(STARTER_MAP)); } catch(e) {}
            }
        }

        function toggleMode() {
            isEditor = !isEditor;
            isPaused = false;
            document.getElementById('hint').innerText = isEditor ? 
                "WASD: Cam | Shift+WASD: Move Block | P: Color | Arrows: Expand | Ctrl+Arrows: Shrink" : 
                "Space: Jump | R: Reset | B: Back Checkpoint | T: Pause";
            document.getElementById('modeBtn').innerText = isEditor ? "Play Level" : "Edit Level";
            document.getElementById('editor-tools').style.display = isEditor ? "flex" : "none";
            selectedObj = null;
            if (!isEditor) resetPlayer(true);
        }

        function setTool(tool, btn) {
            currentTool = tool;
            document.querySelectorAll('.tool').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        cvs.addEventListener('mousedown', (e) => {
            if (!isEditor) return;
            const rect = cvs.getBoundingClientRect();
            const mouseX = e.clientX - rect.left + cameraX;
            const mouseY = e.clientY - rect.top;

            const clicked = map.find(o => mouseX > o.x && mouseX < o.x + o.w && mouseY > o.y && mouseY < o.y + o.h);
            
            if (clicked) {
                selectedObj = clicked;
            } else {
                const newObj = { x: mouseX - 15, y: mouseY - 15, w: 30, h: 30, type: currentTool, color: null };
                if (currentTool === 'platform') newObj.w = 60;
                if (currentTool === 'spikepit') { newObj.w = 30; newObj.h = 15; newObj.y = mouseY; }
                map.push(newObj);
                selectedObj = newObj;
            }
        });

        function resetPlayer(fullRestart) {
            if (fullRestart) player.checkpoints = [{x: 50, y: 300}];
            const cp = player.checkpoints[player.checkpoints.length - 1];
            player.x = cp.x;
            player.y = cp.y;
            player.vy = 0;
            player.rotation = 0;
            player.dead = false;
        }

        function update() {
            if (!isEditor && !isPaused) {
                player.vy += player.gravity;
                player.y += player.vy;
                player.x += 5;
                cameraX = player.x - 100;

                let onGround = (player.y + player.h >= 380);
                if (onGround) {
                    player.y = 380 - player.h;
                    player.vy = 0;
                    player.rotation = Math.round(player.rotation / 45) * 45;
                }

                map.forEach(obj => {
                    if (player.x < obj.x + obj.w && player.x + player.w > obj.x &&
                        player.y < obj.y + obj.h && player.y + player.h > obj.y) {
                        
                        if (obj.type === 'platform') {
                            if (player.vy > 0 && player.y + player.h < obj.y + 15) {
                                player.y = obj.y - player.h;
                                player.vy = 0;
                                onGround = true;
                                player.rotation = Math.round(player.rotation / 90) * 90;
                            } else { player.dead = true; }
                        } else if (obj.type === 'spike' || obj.type === 'spikepit') { 
                            player.dead = true;
                        } else if (obj.type === 'pad') { player.vy = -16;
                        } else if (obj.type === 'checkpoint') {
                            const last = player.checkpoints[player.checkpoints.length-1];
                            if (Math.abs(last.x - obj.x) > 10) player.checkpoints.push({x: obj.x, y: obj.y});
                        }
                    }
                });

                if (keys['Space'] && onGround) player.vy = player.jump;
                if (!onGround) player.rotation += 5;
                if (player.dead) resetPlayer(false);

            } else if (isEditor) {
                // Lowered shift+WASD movement speed to 2px for better precision
                const moveAmt = 2; 
                if (keys['ShiftLeft'] || keys['ShiftRight']) {
                    if (selectedObj) {
                        if (keys['KeyW']) selectedObj.y -= moveAmt;
                        if (keys['KeyS']) selectedObj.y += moveAmt;
                        if (keys['KeyA']) selectedObj.x -= moveAmt;
                        if (keys['KeyD']) selectedObj.x += moveAmt;
                    }
                } else {
                    if (keys['KeyA']) cameraX -= 10;
                    if (keys['KeyD']) cameraX += 10;
                }
                
                if (selectedObj) {
                    const isCtrl = keys['ControlLeft'] || keys['ControlRight'];
                    
                    if (keys['ArrowRight']) {
                        if (isCtrl) selectedObj.w = Math.max(10, selectedObj.w - 2);
                        else selectedObj.w += 2;
                    }
                    if (keys['ArrowLeft']) {
                        if (isCtrl) selectedObj.w = Math.max(10, selectedObj.w - 2);
                        else selectedObj.w += 2;
                    }
                    if (keys['ArrowUp']) {
                        if (isCtrl) { selectedObj.y += 2; selectedObj.h = Math.max(10, selectedObj.h - 2); }
                        else { selectedObj.y -= 2; selectedObj.h += 2; }
                    }
                    if (keys['ArrowDown']) {
                        if (isCtrl) selectedObj.h = Math.max(10, selectedObj.h - 2);
                        else { selectedObj.y -= 2; selectedObj.h += 2; }
                    }
                    if (keys['Delete'] || keys['Backspace']) {
                        map = map.filter(o => o !== selectedObj);
                        selectedObj = null;
                    }
                }
            }
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, cvs.width, cvs.height);
            ctx.save();
            ctx.translate(-cameraX, 0);

            ctx.fillStyle = '#222';
            ctx.fillRect(cameraX, 380, cvs.width, 20);

            map.forEach(obj => {
                ctx.fillStyle = obj.color || (
                    obj.type === 'platform' ? '#3498db' : 
                    obj.type === 'spike' ? '#e74c3c' : 
                    obj.type === 'spikepit' ? '#8e44ad' :
                    obj.type === 'pad' ? '#f1c40f' : '#2ecc71'
                );
                
                if (obj === selectedObj && isEditor) {
                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 3;
                    ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
                }

                if (obj.type === 'spike') {
                    ctx.beginPath();
                    ctx.moveTo(obj.x, obj.y + obj.h);
                    ctx.lineTo(obj.x + obj.w / 2, obj.y);
                    ctx.lineTo(obj.x + obj.w, obj.y + obj.h);
                    ctx.fill();
                } else if (obj.type === 'spikepit') {
                    // Render 3 miniature spikes
                    ctx.beginPath();
                    ctx.moveTo(obj.x, obj.y + obj.h);
                    ctx.lineTo(obj.x + obj.w * 0.16, obj.y);
                    ctx.lineTo(obj.x + obj.w * 0.33, obj.y + obj.h);
                    ctx.lineTo(obj.x + obj.w * 0.5, obj.y);
                    ctx.lineTo(obj.x + obj.w * 0.66, obj.y + obj.h);
                    ctx.lineTo(obj.x + obj.w * 0.83, obj.y);
                    ctx.lineTo(obj.x + obj.w, obj.y + obj.h);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
                }
            });

            ctx.save();
            ctx.translate(player.x + player.w/2, player.y + player.h/2);
            ctx.rotate(player.rotation * Math.PI / 180);
            ctx.fillStyle = '#00ffff';
            ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 2;
            ctx.strokeRect(-player.w/2, -player.h/2, player.w, player.h);
            ctx.fillStyle = 'black';
            ctx.fillRect(-8, -10, 4, 4); ctx.fillRect(4, -10, 4, 4);
            ctx.fillRect(-8, 5, 16, 2);
            ctx.restore();

            if (isPaused && !isEditor) {
                ctx.fillStyle = "rgba(0,0,0,0.4)";
                ctx.fillRect(cameraX, 0, cvs.width, cvs.height);
                ctx.fillStyle = "white";
                ctx.font = "bold 30px Arial";
                ctx.textAlign = "center";
                ctx.fillText("PAUSED", cameraX + cvs.width/2, cvs.height/2);
                ctx.textAlign = "start";
            }

            ctx.restore();
        }

        window.addEventListener('keydown', e => { 
            keys[e.code] = true; 
            
            if (e.code === 'KeyT') {
                isPaused = !isPaused;
            }
            if (isEditor && e.code === 'KeyP' && selectedObj) {
                const newCol = prompt("Enter Hex Color (e.g. #ff0000):", selectedObj.color || "");
                if (newCol) selectedObj.color = newCol;
            }
            if (!isEditor) {
                if (e.code === 'KeyR') resetPlayer(true);
                if (e.code === 'KeyB' && player.checkpoints.length > 1) {
                    player.checkpoints.pop();
                    resetPlayer(false);
                }
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function exportLevel() {
            const code = btoa(JSON.stringify(map));
            document.getElementById('levelCode').value = code;
            navigator.clipboard.writeText(code);
            alert("Code copied!");
        }

        function importLevel() {
            try {
                const code = document.getElementById('levelCode').value;
                map = JSON.parse(atob(code));
                resetPlayer(true);
            } catch(e) { alert("Invalid Code"); }
        }

        function resetLevel() { if(confirm("Clear everything?")) map = []; }

        update();
    </script>
</body>
</html>
