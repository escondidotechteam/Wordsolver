<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dash Ultra + Editor</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; overflow: hidden; }
        canvas { display: block; margin: 10px auto; background: #000; border: 2px solid #444; border-radius: 4px; }
        .menu { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; padding: 10px; }
        button { padding: 8px 12px; cursor: pointer; background: #333; color: white; border: 1px solid #555; border-radius: 4px; font-size: 13px; }
        button.active { background: #2ecc71; border-color: #fff; }
        .controls-hint { font-size: 12px; color: #aaa; margin-bottom: 5px; }
        input { background: #222; color: #2ecc71; border: 1px solid #444; padding: 5px; width: 150px; font-family: monospace; }
        .back-btn { text-decoration: none; color: white; background: #c0392b; padding: 8px 12px; border-radius: 4px; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="menu" style="align-items: center; justify-content: space-between; max-width: 800px; margin: 0 auto; padding: 10px 20px;">
        <a href="index.html" class="back-btn">← Back to Hub</a>
        <div class="controls-hint" id="hint" style="margin: 0;">Mode: Playing | Space: Jump | R: Restart | B: Checkpoint</div>
    </div>

    <canvas id="cvs" width="800" height="400"></canvas>

    <div class="menu">
        <button id="btnPlay" class="active" onclick="setMode(false)">Play Mode</button>
        <button id="btnEdit" onclick="setMode(true)">Editor Mode</button>
        <button onclick="resetLevel()">Clear Map</button>
    </div>

    <div class="menu">
        <button onclick="setTool('platform')">Build Platform</button>
        <button onclick="setTool('spike')">Build Spike</button>
        <button onclick="setTool('spikepit')">Build Spike Pit</button>
        <button onclick="setTool('pad')">Build Jump Pad</button>
        <button onclick="setTool('checkpoint')">Build Checkpoint</button>
    </div>

    <div class="menu">
        <input type="text" id="levelCode" placeholder="Level Code String">
        <button onclick="exportLevel()">Export Level</button>
        <button onclick="importLevel()">Import Level</button>
    </div>

    <script>
        const cvs = document.getElementById('cvs');
        const ctx = cvs.getContext('2d');

        let isEditor = false;
        let isPaused = false;
        let currentTool = 'platform';
        let cameraX = 0;
        let selectedObj = null;

        let player = {
            x: 100, y: 300, w: 30, h: 30,
            vy: 0, gravity: 0.9, jump: -12,
            rotation: 0, dead: false,
            checkpoints: [{x: 100, y: 300}]
        };

        let map = [
            {type:'platform', x: 0, y: 380, w: 2000, h: 20},
            {type:'spike', x: 400, y: 350, w: 30, h: 30},
            {type:'spike', x: 600, y: 350, w: 30, h: 30},
            {type:'platform', x: 750, y: 300, w: 120, h: 20}
        ];

        let keys = {};

        function setMode(ed) {
            isEditor = ed;
            document.getElementById('btnPlay').className = ed ? '' : 'active';
            document.getElementById('btnEdit').className = ed ? 'active' : '';
            if(!ed) resetPlayer(true);
        }

        function setTool(t) { currentTool = t; }

        function resetPlayer(full) {
            if (full || player.checkpoints.length === 0) {
                player.checkpoints = [{x: 100, y: 300}];
            }
            const pt = player.checkpoints[player.checkpoints.length - 1];
            player.x = pt.x;
            player.y = pt.y;
            player.vy = 0;
            player.rotation = 0;
            player.dead = false;
            cameraX = player.x - 100;
        }

        // Handle Click Placements in Editor
        cvs.addEventListener('mousedown', e => {
            if (!isEditor) return;
            const rect = cvs.getBoundingClientRect();
            const clickX = e.clientX - rect.left + cameraX;
            const clickY = e.clientY - rect.top;

            // Select item
            let found = map.find(o => clickX > o.x && clickX < o.x+o.w && clickY > o.y && clickY < o.y+o.h);
            if (found) {
                selectedObj = found;
                return;
            }

            // Snap positioning points
            const gridX = Math.floor(clickX / 30) * 30;
            const gridY = Math.floor(clickY / 30) * 30;

            let newObj = { type: currentTool, x: gridX, y: gridY, w: 30, h: 30 };
            if (currentTool === 'platform') { newObj.w = 90; newObj.h = 30; }
            if (currentTool === 'checkpoint') { newObj.w = 20; newObj.h = 40; newObj.y -= 10; }
            
            map.push(newObj);
            selectedObj = newObj;
        });

        // --- FPS TIME DELTA FRAME ENGINE GATE ---
        let lastTime = 0;
        const fpsTarget = 60;
        const frameInterval = 1000 / fpsTarget;

        function update(timestamp) {
            requestAnimationFrame(update);

            if (!timestamp) timestamp = performance.now();
            let elapsed = timestamp - lastTime;

            // Gate step execution tracking
            if (elapsed < frameInterval) return;
            lastTime = timestamp - (elapsed % frameInterval);

            if (!isEditor && !isPaused) {
                player.vy += player.gravity;
                player.y += player.vy;
                player.x += 5;
                cameraX = player.x - 100;

                let onGround = (player.y + player.h >= 380);
                if (onGround) {
                    player.y = 380 - player.h;
                    player.vy = 0;
                    player.rotation = Math.round(player.rotation / 90) * 90;
                }

                map.forEach(obj => {
                    if (player.x < obj.x + obj.w && player.x + player.w > obj.x &&
                        player.y < obj.y + obj.h && player.y + player.h > obj.y) {
                        
                        if (obj.type === 'platform') {
                            if (player.vy > 0 && player.y + player.h < obj.y + 15) {
                                player.y = obj.y - player.h;
                                player.vy = 0;
                                onGround = true;
                                player.rotation = Math.round(player.rotation / 90) * 90;
                            } else { player.dead = true; }
                        } else if (obj.type === 'spike' || obj.type === 'spikepit') { 
                            player.dead = true;
                        } else if (obj.type === 'pad') { 
                            player.vy = -16;
                        } else if (obj.type === 'checkpoint') {
                            const last = player.checkpoints[player.checkpoints.length-1];
                            if (Math.abs(last.x - obj.x) > 10) player.checkpoints.push({x: obj.x, y: obj.y});
                        }
                    }
                });

                if (keys['Space'] && onGround) {
                    player.vy = player.jump;
                    player.rotation = 0;
                }
                
                if (!onGround) {
                    player.rotation += 6;
                }
                
                if (player.dead) resetPlayer(false);

            } else if (isEditor) {
                const moveAmt = 2; 
                if (keys['ShiftLeft'] || keys['ShiftRight']) {
                    if (selectedObj) {
                        if (keys['KeyW']) selectedObj.y -= moveAmt;
                        if (keys['KeyS']) selectedObj.y += moveAmt;
                        if (keys['KeyA']) selectedObj.x -= moveAmt;
                        if (keys['KeyD']) selectedObj.x += moveAmt;
                    }
                } else {
                    if (keys['KeyA']) cameraX -= 10;
                    if (keys['KeyD']) cameraX += 10;
                }
                
                if (selectedObj) {
                    const isCtrl = keys['ControlLeft'] || keys['ControlRight'];
                    
                    if (keys['ArrowRight']) {
                        if (isCtrl) selectedObj.w = Math.max(10, selectedObj.w - 2);
                        else selectedObj.w += 2;
                    }
                    if (keys['ArrowLeft']) {
                        if (isCtrl) selectedObj.w = Math.max(10, selectedObj.w - 2);
                        else selectedObj.w += 2;
                    }
                    if (keys['ArrowUp']) {
                        if (isCtrl) { selectedObj.y += 2; selectedObj.h = Math.max(10, selectedObj.h - 2); }
                        else { selectedObj.y -= 2; selectedObj.h += 2; }
                    }
                    if (keys['ArrowDown']) {
                        if (isCtrl) selectedObj.h = Math.max(10, selectedObj.h - 2);
                        else { selectedObj.y -= 2; selectedObj.h += 2; }
                    }
                    if (keys['Delete'] || keys['Backspace']) {
                        map = map.filter(o => o !== selectedObj);
                        selectedObj = null;
                    }
                }
            }
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, cvs.width, cvs.height);
            ctx.save();
            ctx.translate(-cameraX, 0);

            ctx.fillStyle = '#222';
            ctx.fillRect(cameraX, 380, cvs.width, 20);

            map.forEach(obj => {
                ctx.fillStyle = obj.color || (
                    obj.type === 'platform' ? '#3498db' : 
                    obj.type === 'spike' ? '#e74c3c' : 
                    obj.type === 'spikepit' ? '#8e44ad' :
                    obj.type === 'pad' ? '#f1c40f' : '#2ecc71'
                );
                
                if (obj === selectedObj && isEditor) {
                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 3;
                    ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
                }

                if (obj.type === 'spike') {
                    ctx.beginPath();
                    ctx.moveTo(obj.x, obj.y + obj.h);
                    ctx.lineTo(obj.x + obj.w / 2, obj.y);
                    ctx.lineTo(obj.x + obj.w, obj.y + obj.h);
                    ctx.fill();
                } else if (obj.type === 'spikepit') {
                    ctx.beginPath();
                    ctx.moveTo(obj.x, obj.y + obj.h);
                    ctx.lineTo(obj.x + obj.w * 0.16, obj.y);
                    ctx.lineTo(obj.x + obj.w * 0.33, obj.y + obj.h);
                    ctx.lineTo(obj.x + obj.w * 0.5, obj.y);
                    ctx.lineTo(obj.x + obj.w * 0.66, obj.y + obj.h);
                    ctx.lineTo(obj.x + obj.w * 0.83, obj.y);
                    ctx.lineTo(obj.x + obj.w, obj.y + obj.h);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
                }
            });

            ctx.save();
            ctx.translate(player.x + player.w/2, player.y + player.h/2);
            ctx.rotate(player.rotation * Math.PI / 180);
            ctx.fillStyle = '#00ffff';
            ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 2;
            ctx.strokeRect(-player.w/2, -player.h/2, player.w, player.h);
            ctx.fillStyle = 'black';
            ctx.fillRect(-8, -10, 4, 4); ctx.fillRect(4, -10, 4, 4);
            ctx.fillRect(-8, 5, 16, 2);
            ctx.restore();

            if (isPaused && !isEditor) {
                ctx.fillStyle = "rgba(0,0,0,0.4)";
                ctx.fillRect(cameraX, 0, cvs.width, cvs.height);
                ctx.fillStyle = "white";
                ctx.font = "bold 30px Arial";
                ctx.textAlign = "center";
                ctx.fillText("PAUSED", cameraX + cvs.width/2, cvs.height/2);
                ctx.textAlign = "start";
            }

            ctx.restore();
        }

        window.addEventListener('keydown', e => { 
            keys[e.code] = true; 
            if (e.code === 'KeyT') isPaused = !isPaused;
            if (isEditor && e.code === 'KeyP' && selectedObj) {
                const newCol = prompt("Enter Hex Color (e.g. #ff0000):", selectedObj.color || "");
                if (newCol) selectedObj.color = newCol;
            }
            if (!isEditor) {
                if (e.code === 'KeyR') resetPlayer(true);
                if (e.code === 'KeyB' && player.checkpoints.length > 1) {
                    player.checkpoints.pop();
                    resetPlayer(false);
                }
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function exportLevel() {
            const code = btoa(JSON.stringify(map));
            document.getElementById('levelCode').value = code;
            navigator.clipboard.writeText(code);
            alert("Code copied!");
        }

        function importLevel() {
            try {
                const code = document.getElementById('levelCode').value;
                map = JSON.parse(atob(code));
                resetPlayer(true);
            } catch(e) { alert("Invalid Code"); }
        }

        function resetLevel() { if(confirm("Clear everything?")) map = []; }

        // Core execution entry point
        requestAnimationFrame(update);
    </script>
</body>
</html>
