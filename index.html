<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcade Hub</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4886001552104921" crossorigin="anonymous"></script>
    <style>
        /* Global CSS Variables for Quick Color Tweaks */
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #ffffff;
            --border-color: #333333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        /* ---------------------------------- */
        /* RESPONSIVE LAYOUT ENGINE (PC FIRST)*/
        /* ---------------------------------- */
        .page-container {
            display: grid;
            grid-template-columns: 160px 1fr 160px; /* Side Skyscraper Slots */
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            align-items: start;
        }

        /* Center Hub Frame */
        .hub-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-area h1 {
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 800;
        }

        /* Main Dashboard Panel */
        .menu-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            padding: 25px;
            box-sizing: border-box;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
        }

        .panel-title {
            font-size: 1.4rem;
            margin: 0 0 20px 0;
            font-weight: 600;
        }

        /* Button Stack Styles */
        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .menu-btn {
            display: block;
            width: 100%;
            padding: 14px;
            box-sizing: border-box;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.1s, filter 0.2s;
        }

        .menu-btn:active { transform: scale(0.98); }
        .menu-btn:hover { filter: brightness(1.1); }

        /* Color profiles matching your setup */
        .btn-chat { background-color: #e74c3c; }
        .btn-brick { background-color: #9b59b6; }
        .btn-solver { background-color: #3498db; }
        .btn-bird { background-color: #f1c40f; color: #121212; }
        .btn-sprint { background-color: #2ecc71; }
        .btn-poly { background-color: #e67e22; }
        .btn-cloud { background-color: #27ae60; }
        .btn-play { background-color: #3498db; padding: 6px 12px; font-size: 14px; width: auto; display: inline-block;}
        .btn-share { background-color: #2ecc71; margin-top: 10px;}

        /* Community Level Component Elements */
        .section-divider {
            border-top: 1px solid var(--border-color);
            margin: 20px 0;
            padding-top: 15px;
        }

        .level-row {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            text-align: left;
        }

        .level-input, .level-textarea {
            width: 100%;
            background: #111;
            border: 1px solid var(--border-color);
            color: white;
            padding: 10px;
            border-radius: 4px;
            box-sizing: border-box;
            margin-bottom: 10px;
            font-family: inherit;
        }

        .level-textarea { height: 60px; resize: none; }

        .logout-btn {
            color: #c0392b;
            text-decoration: none;
            font-size: 13px;
            display: inline-block;
            margin-top: 15px;
            font-weight: bold;
        }
        .logout-btn:hover { text-decoration: underline; }

        /* ---------------------------------- */
        /* AD SLOTS AND CONTAINERS            */
        /* ---------------------------------- */
        .ad-slot {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #181818;
            border: 1px dashed #2a2a2a;
            border-radius: 8px;
            box-sizing: border-box;
        }

        /* Desktop Skyscraper Layout rules */
        .side-ad {
            width: 160px;
            height: 600px;
            position: sticky;
            top: 20px;
        }

        /* Mobile Mobile/Tablet Top & Bottom containers hidden on PC */
        .mobile-ad { display: none; width: 100%; max-width: 450px; height: 50px; margin: 10px 0;}

        /* ---------------------------------- */
        /* RESPONSIVE BREAKPOINT CODE         */
        /* ---------------------------------- */
        
        /* Handles Mobile devices and iPads/Tablets */
        @media (max-width: 850px) {
            .page-container {
                grid-template-columns: 1fr; /* Drop side columns entirely */
                padding: 10px;
                gap: 10px;
                min-height: auto;
            }

            .side-ad {
                display: none; /* Vaporize vertical ads on smaller screens */
            }

            .mobile-ad {
                display: flex; /* Activate horizontal top/bottom banner elements */
            }
            
            .logo-area h1 { font-size: 2rem; margin-top: 10px; }
        }
    </style>
</head>
<body>

<div class="page-container">

    <div class="ad-slot side-ad">
        <ins class="adsbygoogle"
             style="display:inline-block;width:160px;height:600px"

             data-ad-slot="1234567890"></ins> <script> (adsbygoogle = window.adsbygoogle || []).push({}); </script>
    </div>

            <script> (adsbygoogle = window.adsbygoogle || []).push({}); </script>
        </div>

        <div class="logo-area">
            <h1>Arcade Hub</h1>
        </div>

        <div class="menu-panel">
            <div class="panel-title">Welcome, BigLittleThings</div>
            
            <div class="button-stack">
                <a href="chat.html" class="menu-btn btn-chat">Live Community Chat</a>
                <a href="brickboom.html" class="menu-btn btn-brick">BrickBoom</a>
                <a href="search_solver.html" class="menu-btn btn-solver">Word Search Solver</a>
                <a href="floppy_bird.html" class="menu-btn btn-bird">Floppy Bird</a>
                <a href="geometry_sprint.html" class="menu-btn btn-sprint">Geometry Sprint</a>
                <a href="polytrack.html" class="menu-btn btn-poly">Polytrack (404)</a>
                <a href="cloud_drive.html" class="menu-btn btn-cloud">Video Cloud Drive</a>
            </div>

            <div class="section-divider">
                <div class="panel-title" style="font-size: 1.1rem; margin-bottom: 15px;">Community Levels</div>
                <div class="level-row">
                    <span><b>Basic Level</b></span>
                    <button class="menu-btn btn-play" onclick="playLevel('basic')">Play</button>

            <div class="section-divider">

                <input type="text" class="level-input" placeholder="Level Title">

                <button class="menu-btn btn-share">Share Level</button>
            </div>

            <a href="logout.html" class="logout-btn">Log out</a>
        </div>

        <div class="ad-slot mobile-ad">
            <ins class="adsbygoogle"
                 style="display:inline-block;width:320px;height:50px"
                 data-ad-client="ca-pub-4886001552104921"
                 data-ad-slot="2222222222"></ins>
            <script> (adsbygoogle = window.adsbygoogle || []).push({}); </script>
        </div>

    </div>

    <div class="ad-slot side-ad">
        <ins class="adsbygoogle"
             style="display:inline-block;width:160px;height:600px"
             data-ad-client="ca-pub-4886001552104921"
             data-ad-slot="0987654321"></ins>
        <script> (adsbygoogle = window.adsbygoogle || []).push({}); </script>
    </div>

</div>
