<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcade Hub</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #ffffff;
            --border-color: #333333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        /* ---------------------------------- */
        /* GRID LAYOUT ENGINE (PC / DESKTOP)  */
        /* ---------------------------------- */
        .page-container {
            display: grid;
            grid-template-columns: 160px 1fr 160px; /* Restricts side towers to hold strict sizes */
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            align-items: start;
        }

        /* Centers the dashboard box perfectly */
        .hub-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-area h1 {
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 800;
        }

        /* The Main Hub Panel Box */
        .menu-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            padding: 25px;
            box-sizing: border-box;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
        }

        .panel-title {
            font-size: 1.4rem;
            margin: 0 0 20px 0;
            font-weight: 600;
        }

        /* Button Configuration */
        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .menu-btn {
            display: block;
            width: 100%;
            padding: 14px;
            box-sizing: border-box;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.1s, filter 0.2s;
            text-align: center;
        }

        .menu-btn:active { transform: scale(0.98); }
        .menu-btn:hover { filter: brightness(1.1); }

        /* Button Palette Mapping */
        .btn-chat { background-color: #e74c3c; }
        .btn-brick { background-color: #9b59b6; }
        .btn-solver { background-color: #3498db; }
        .btn-bird { background-color: #f1c40f; color: #121212; }
        .btn-sprint { background-color: #2ecc71; }
        .btn-poly { background-color: #e67e22; }
        .btn-cloud { background-color: #27ae60; }
        .btn-play { background-color: #3498db; padding: 6px 12px; font-size: 14px; width: auto; display: inline-block;}
        .btn-share { background-color: #2ecc71; margin-top: 10px;}
        
        /* Ko-fi Button Specific Design */
        .btn-kofi {
            background-color: #ff5e5b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .kofi-cup {
            width: 20px;
            height: 20px;
            filter: brightness(0) invert(1);
        }

        /* Unblockable Smartlink Banner Styling for iPads */
        .btn-smartlink {
            background: linear-gradient(135deg, #f39c12, #d35400);
            border: 1px solid #e67e22;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.9; }
            50% { opacity: 1; transform: scale(1.01); }
            100% { opacity: 0.9; }
        }

        /* Level Share Area Styles */
        .section-divider {
            border-top: 1px solid var(--border-color);
            margin: 20px 0;
            padding-top: 15px;
        }

        .level-row {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            text-align: left;
        }

        .level-input, .level-textarea {
            width: 100%;
            background: #111;
            border: 1px solid var(--border-color);
            color: white;
            padding: 10px;
            border-radius: 4px;
            box-sizing: border-box;
            margin-bottom: 10px;
            font-family: inherit;
        }

        .level-textarea { height: 60px; resize: none; }

        .logout-btn {
            color: #c0392b;
            text-decoration: none;
            font-size: 13px;
            display: inline-block;
            margin-top: 15px;
            font-weight: bold;
        }
        .logout-btn:hover { text-decoration: underline; }

        /* ---------------------------------- */
        /* ADSTERRA STRUCTURAL WRAPPERS       */
        /* ---------------------------------- */
        .ad-zone {
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        /* Desktop side settings */
        .side-tower {
            width: 160px;
            min-height: 600px;
            position: sticky;
            top: 20px;
        }

        /* Mobile banners default to hidden status on PC monitors */
        .top-tablet-banner { display: none; width: 100%; max-width: 468px; margin-bottom: 15px; }
        .bottom-mobile-banner { display: none; width: 100%; max-width: 320px; margin-top: 20px; }

        /* ---------------------------------- */
        /* MOBILE & IPAD RESPONSIVE QUERY CODE*/
        /* ---------------------------------- */
        @media (max-width: 850px) {
            .page-container {
                grid-template-columns: 1fr; /* Rips down sidebar columns completely */
                padding: 10px;
                gap: 5px;
                min-height: auto;
            }

            .side-tower {
                display: none !important; /* Discards skyscraper scripts on narrow viewports */
            }

            .top-tablet-banner {
                display: flex; /* Activates layout for iPads */
            }

            .bottom-mobile-banner {
                display: flex; /* Activates layout for phones */
            }

            .logo-area h1 { font-size: 2rem; margin-top: 10px; }
        }
    </style>
</head>
