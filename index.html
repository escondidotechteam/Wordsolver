<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Arcade Hub</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            box-sizing: border-box;
        }
        .box {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 480px;
            width: 90%;
            border: 1px solid #333;
            margin-bottom: 20px;
        }
        h2, h3 { margin-top: 0; color: #fff; }
        input[type="password"], input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #444;
            border-radius: 6px;
            background: #2b2b2b;
            color: #fff;
            font-size: 15px;
            box-sizing: border-box;
        }
        textarea { height: 80px; resize: none; font-family: monospace; }
        button {
            width: 100%;
            padding: 12px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            margin-bottom: 10px;
        }
        button:hover { background: #27ae60; }
        button:disabled { background: #444; cursor: not-allowed; }
        .hidden { display: none !important; }
        
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 15px;
            margin-bottom: 25px;
        }
        .nav-btn {
            display: block;
            padding: 14px;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            transition: transform 0.2s, filter 0.2s;
        }
        .nav-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-chat { background: #e74c3c; }
        .btn-brick { background: #9b59b6; }
        .btn-word { background: #3498db; }
        .btn-flappy { background: #f1c40f; color: #000; }
        .btn-geometry { background: #2ecc71; }
        .btn-poly { background: #e67e22; }
        .btn-drive { background: #27ae60; } /* Darker green for Drive */

        .level-board {
            background: #141414;
            border-radius: 8px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #2a2a2a;
            margin-bottom: 15px;
            text-align: left;
        }
        .level-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #222;
        }
        .level-item:last-child { border-bottom: none; }
        .play-lvl-btn {
            background: #3498db;
            padding: 6px 12px;
            border-radius: 4px;
            color: white;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="device-error" class="hidden">
        <h1>404 Not Found</h1>
        <p>The requested URL was not found on this server.</p>
    </div>

    <div id="gate-area" class="box">
        <h2 id="gate-title">System Verification</h2>
        <input type="password" id="master-pass" placeholder="Master Passcode">
        <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">
        
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="userpin" placeholder="4 to 8 Digit Code" maxlength="8">
        
        <button id="auth-btn" onclick="handleAuth()">Sign In</button>
        <p id="toggle-text" style="font-size: 12px; color: #888; cursor: pointer; text-decoration: underline;" onclick="toggleMode()">New here? Create Account</p>
        <p id="err" style="color: #e74c3c; font-size: 14px; margin-top: 10px;"></p>
    </div>

    <div id="menu-area" class="box hidden">
        <h2 id="welcome-msg">Main Menu Hub</h2>
        <div class="menu-grid">
            <a href="chat.html" class="nav-btn btn-chat">Live Community Chat</a>
            <a href="brickboom.html" class="nav-btn btn-brick">BrickBoom</a>
            <a href="solver.html" class="nav-btn btn-word">Word Search Solver</a>
            <a href="flappy.html" class="nav-btn btn-flappy">Floppy Bird</a>
            <a href="geometry.html" class="nav-btn btn-geometry">Geometry Sprint</a>
            <a href="polytrack/index.html" class="nav-btn btn-poly">Polytrack (404)</a>
            <a href="YOUR_GOOGLE_DRIVE_LINK_HERE" target="_blank" class="nav-btn btn-drive">Video Cloud Drive</a>
        </div>

        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

        <h3>Community Levels</h3>
        <div class="level-board" id="levels-container"></div>

        <h3>Post Your Level</h3>
        <input type="text" id="lvl-title" placeholder="Level Title">
        <textarea id="lvl-data" placeholder="Paste level string..."></textarea>
        <button style="background-color: #2ecc71;" onclick="postLevel()">Share Level</button>
        <p id="share-status" style="font-size:12px; color:#aaa;"></p>
        
        <p style="margin-top: 25px;"><a href="#" onclick="logout()" style="color: #e74c3c; font-size: 13px; text-decoration: none;">Log out</a></p>
    </div>

    <script>
        // 1. SETTINGS
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzc9ddpOWJnNEevAoEb1BC0b6I8r5qEKxlj1YDjp9RPs9ksn_GwjR55E2k9ZP2rQyD7iQ/exec";
        const ALLOWED_HASHES = ["Q2hyaXM=", "TW9ua2V5c2xheWVyNDE=", "QWRtaW4xOTc=", "Y28xMjM=", "aUxvdmVNZWdhbkZveFRvZXMg", "NTY2NTU2NjU=", "Umlja3kzMjE=", "Um95ZWNlNzc3", "RGFtaWFuMzg5"];
        
        let isRegisterMode = false;

        // 2. DEVICE FILTER (iPad Only - Currently Disabled for PC Access)
        /*
        const isIPad = /iPad|Macintosh/.test(navigator.userAgent) && 'ontouchend' in document;
        if (!isIPad) {
            document.body.innerHTML = document.getElementById('device-error').innerHTML;
            document.body.style.backgroundColor = "#fff";
            document.body.style.color = "#000";
            window.stop(); 
        }
        */

        // 3. AUTH LOGIC
        window.onload = function() {
            if (localStorage.getItem('isAuthorized') === 'true') { showMenu(); }
        };

        function toggleMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('gate-title').innerText = isRegisterMode ? "Create Account" : "System Verification";
            document.getElementById('auth-btn').innerText = isRegisterMode ? "Register & Enter" : "Sign In";
            document.getElementById('toggle-text').innerText = isRegisterMode ? "Already have an account? Sign In" : "New here? Create Account";
        }

        async function handleAuth() {
            const master = document.getElementById('master-pass').value;
            const user = document.getElementById('username').value.trim();
            const pin = document.getElementById('userpin').value.trim();
            const err = document.getElementById('err');
            const btn = document.getElementById('auth-btn');

            if (!ALLOWED_HASHES.includes(btoa(master))) return err.innerText = "Invalid Master Passcode.";
            
            if (!user || (pin.length < 4 || pin.length > 8)) {
                 return err.innerText = "PIN must be between 4 and 8 digits.";
            }

            err.innerText = "Connecting to Cloud...";
            btn.disabled = true;

            const payload = {
                type: isRegisterMode ? "register" : "login",
                username: user,
                pin: pin
            };

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                const res = await response.json();

                if (res.status === "success") {
                    localStorage.setItem('isAuthorized', 'true');
                    localStorage.setItem('username', user);
                    showMenu();
                } else if (res.status === "exists") {
                    err.innerText = "Username already taken.";
                    btn.disabled = false;
                } else {
                    err.innerText = "Invalid Username or PIN.";
                    btn.disabled = false;
                }
            } catch (e) {
                err.innerText = "Cloud Error. Try again.";
                btn.disabled = false;
            }
        }

        function showMenu() {
            document.getElementById('gate-area').classList.add('hidden');
            document.getElementById('menu-area').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = "Welcome, " + localStorage.getItem('username');
            loadLevels();
        }

        function logout() {
            localStorage.removeItem('isAuthorized');
            localStorage.removeItem('username');
            location.reload();
        }

        // 4. LEVEL SHARING
        function loadLevels() {
            const container = document.getElementById('levels-container');
            container.innerHTML = "Fetching...";
            fetch(SCRIPT_URL)
                .then(res => res.json())
                .then(levels => {
                    container.innerHTML = "";
                    levels.forEach(lvl => {
                        const div = document.createElement('div');
                        div.className = "level-item";
                        div.innerHTML = `<div><strong>${lvl.title}</strong></div>
                                         <a href="geometry.html?level=${encodeURIComponent(lvl.data)}" class="play-lvl-btn">Play</a>`;
                        container.appendChild(div);
                    });
                });
        }

        function postLevel() {
            const title = document.getElementById('lvl-title').value.trim();
            const data = document.getElementById('lvl-data').value.trim();
            const status = document.getElementById('share-status');
            if (!title || !data) return;

            status.innerText = "Sharing...";
            fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ type: "level", title, data }),
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                redirect: "follow"
            }).then(() => {
                status.innerText = "Success!";
                loadLevels();
            });
        }
    </script>
</body>
</html>
