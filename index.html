<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Menu</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .box {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 90%;
            border: 1px solid #333;
        }
        h2 { margin-top: 0; color: #fff; }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #444;
            border-radius: 6px;
            background: #2b2b2b;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background: #27ae60; }
        .hidden { display: none; }
        
        /* Menu Styles */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 20px;
        }
        .nav-btn {
            display: block;
            padding: 14px;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            transition: transform 0.2s, filter 0.2s;
        }
        .nav-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-word { background: #3498db; }
        .btn-flappy { background: #f1c40f; color: #000; }
        .btn-geometry { background: #2ecc71; }
        .btn-poly { background: #e67e22; }
    </style>
</head>
<body>

    <div id="device-error" class="hidden">
        <h1>404 Not Found</h1>
        <p>The requested URL was not found on this server.</p>
    </div>

    <div id="gate-area" class="box">
        <h2>System Verification</h2>
        <p style="color: #888; font-size: 14px;">Enter authorization passcode to proceed.</p>
        <input type="password" id="passcode" placeholder="Passcode">
        <button onclick="checkAccess()">Unlock Menu</button>
        <p id="err" style="color: #e74c3c; font-size: 14px; margin-top: 10px;"></p>
    </div>

    <div id="menu-area" class="box hidden">
        <h2>Main Menu Hub</h2>
        <p style="color: #888; font-size: 14px; margin-bottom: 20px;">Welcome back. Select an application:</p>
        
        <div class="menu-grid">
            <a href="solver.html" class="nav-btn btn-word">Word Search Solver</a>
            <a href="flappy.html" class="nav-btn btn-flappy">Flappy Bird Pro</a>
            <a href="geometry.html" class="nav-btn btn-geometry">Geometry Dash Ultra</a>
            <a href="polytrack/index.html" class="nav-btn btn-poly">Polytrack (Local)</a>
        </div>
    </div>

    <script>
        // --- 1. IPAD ONLY HARDWARE FILTER ---
        const ua = navigator.userAgent;
        const isIPad = /iPad|Macintosh/.test(ua) && 'ontouchend' in document;

        const enforceDeviceCheck = true; 

        if (enforceDeviceCheck && !isIPad) {
            document.body.innerHTML = document.getElementById('device-error').innerHTML;
            document.body.style.backgroundColor = "#fff";
            document.body.style.color = "#000";
            document.body.style.fontFamily = "sans-serif";
            document.body.style.textAlign = "left";
            document.body.style.padding = "20px";
            window.stop(); 
        }

        // --- 2. MULTI-PASSCODE GATE ---
        const ALLOWED_HASHES = ["QURtaW4xOTc=", "YWhjZDEwNg==", "UEBzc3cwcmQ0MzIx"]; 

        function checkAccess() {
            const pin = document.getElementById('passcode').value;
            
            if (ALLOWED_HASHES.includes(btoa(pin))) {
                document.getElementById('gate-area').classList.add('hidden');
                document.getElementById('menu-area').classList.remove('hidden');
            } else {
                document.getElementById('err').innerText = "Access Denied: Invalid Authorization.";
            }
        }
    </script>
</body>
</html>
