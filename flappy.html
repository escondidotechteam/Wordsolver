<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Pro</title>
    <style>
        body { margin: 0; text-align: center; background: #70c5ce; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; margin: 20px auto; border: 4px solid #fff; border-radius: 8px; background: #4ec0ca; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .ui { color: white; text-shadow: 2px 2px #000; margin-top: 10px; }
        .back-btn { text-decoration: none; color: white; background: #333; padding: 10px 20px; border-radius: 5px; display: inline-block; margin-top: 5px; transition: 0.2s; font-weight: bold; }
        .back-btn:hover { background: #555; }
    </style>
</head>
<body>
    <div class="ui">
        <h1>Floppy Bird</h1>
        <p style="margin: 5px 0;">Tap to jump | <strong>Hold</strong> for Super Leap</p>
        <a href="index.html" class="back-btn">Back to Home Hub</a>
    </div>
    <canvas id=\"c\" width=\"320\" height=\"480\"></canvas>

    <script>
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');

        let bird, pipes, clouds, score, frame, gameOver, isHolding;

        function reset() {
            bird = { x: 50, y: 200, r: 12, v: 0, g: 0.35, jump: 6.5, thrust: 0.6 };
            pipes = [];
            clouds = [];
            score = 0;
            frame = 0;
            gameOver = false;
            isHolding = false;
        }

        function drawBird(x, y, r, v) {
            ctx.save();
            ctx.translate(x, y);
            let rot = Math.min(Math.max(v * 0.07, -0.4), 0.7);
            ctx.rotate(rot);
            
            // Body Setup
            ctx.fillStyle = '#f1c40f';
            ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();

            // Eye Design
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(5, -4, 4, 0, Math.PI*2); ctx.fill();
            ctx.stroke();
            ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.arc(6, -4, 1.5, 0, Math.PI*2); ctx.fill();

            // Beak
            ctx.fillStyle = '#e67e22';
            ctx.beginPath();
            ctx.moveTo(10, -2); ctx.lineTo(17, 2); ctx.lineTo(10, 5);
            ctx.closePath(); ctx.fill(); ctx.stroke();

            // Wing structure
            ctx.fillStyle = '#f39c12';
            ctx.beginPath(); ctx.arc(-5, 2, 5, 0, Math.PI*2); ctx.fill(); ctx.stroke();

            ctx.restore();
        }

        function drawPipe(x, y, w, gap) {
            ctx.fillStyle = '#2ecc71';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2.5;

            // Top segment draw frame
            ctx.fillRect(x, 0, w, y);
            ctx.strokeRect(x, -5, w, y + 5);
            ctx.fillRect(x-4, y-20, w+8, 20);
            ctx.strokeRect(x-4, y-20, w+8, 20);

            // Bottom segment draw frame
            let by = y + gap;
            let bh = c.height - by;
            ctx.fillRect(x, by, w, bh);
            ctx.strokeRect(x, by, w, bh + 5);
            ctx.fillRect(x-4, by, w+8, 20);
            ctx.strokeRect(x-4, by, w+8, 20);
        }

        function drawCloud(cl) {
            ctx.fillStyle = 'rgba(255,255,255,0.75)';
            ctx.beginPath();
            ctx.arc(cl.x, cl.y, cl.r, 0, Math.PI*2);
            ctx.arc(cl.x + 15, cl.y - 10, cl.r * 1.2, 0, Math.PI*2);
            ctx.arc(cl.x + 35, cl.y, cl.r * 0.9, 0, Math.PI*2);
            ctx.fill();
        }

        // --- FPS TIME DELTA FRAME ENGINE GATE ---
        let lastTime = 0;
        const fpsTarget = 60;
        const frameInterval = 1000 / fpsTarget;

        function loop(timestamp) {
            requestAnimationFrame(loop);

            if (!timestamp) timestamp = performance.now();
            let elapsed = timestamp - lastTime;

            // Block cycle execution if running too hot
            if (elapsed < frameInterval) return;
            lastTime = timestamp - (elapsed % frameInterval);

            if (!gameOver) {
                if (isHolding) {
                    bird.v -= bird.thrust; 
                    if (bird.v < -7) bird.v = -7; 
                }

                bird.v += bird.g;
                bird.y += bird.v;

                if (frame % 100 === 0) {
                    let h = Math.random() * (c.height - 250) + 50;
                    pipes.push({ x: c.width, y: h, w: 50, gap: 125 });
                }
                if (frame % 120 === 0) {
                    clouds.push({ x: c.width + 50, y: Math.random() * 150 + 50, r: 20, s: Math.random() + 0.5 });
                }

                pipes.forEach(p => p.x -= 2);
                clouds.forEach(cl => cl.x -= cl.s);
                pipes = pipes.filter(p => p.x + p.w + 10 > 0);
                clouds = clouds.filter(cl => cl.x + 50 > 0);

                if (bird.y + bird.r > c.height) gameOver = true;
                pipes.forEach(p => {
                    if (bird.x + bird.r > p.x && bird.x - bird.r < p.x + p.w) {
                        if (bird.y - bird.r < p.y || bird.y + bird.r > p.y + p.gap) gameOver = true;
                    }
                    if (p.x === bird.x) score++;
                });
            }

            ctx.fillStyle = '#4ec0ca'; ctx.fillRect(0, 0, c.width, c.height);
            clouds.forEach(drawCloud);
            pipes.forEach(p => drawPipe(p.x, p.y, p.w, p.gap));
            drawBird(bird.x, bird.y, bird.r, bird.v);

            ctx.fillStyle = 'white'; ctx.font = 'bold 35px Arial'; ctx.fillText(score, 10, 45);
            
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0,0,c.width,c.height);
                ctx.fillStyle = 'white'; ctx.textAlign = "center";
                ctx.font = '40px Arial'; ctx.fillText("GAME OVER", c.width/2, 240);
                ctx.font = '20px Arial'; ctx.fillText("Tap to Restart", c.width/2, 280);
                ctx.textAlign = "start";
            }

            frame++;
        }

        const startAction = (e) => {
            if (e.type === 'touchstart') e.preventDefault();
            if (gameOver) { reset(); return; }
            isHolding = true;
            bird.v = -bird.jump;
        };

        const stopAction = () => { isHolding = false; };

        window.addEventListener('keydown', e => { if (e.code === 'Space') startAction(e); });
        window.addEventListener('keyup', e => { if (e.code === 'Space') stopAction(); });
        c.addEventListener('mousedown', startAction);
        window.addEventListener('mouseup', stopAction);
        c.addEventListener('touchstart', startAction);
        window.addEventListener('touchend', stopAction);

        reset();
        requestAnimationFrame(loop);
    </script>
</body>
</html>
