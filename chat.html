<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    </title>Live Chat - Debug Mode</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        #debug-log { background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 12px; border: 1px solid #333; height: 100px; overflow-y: auto; margin-bottom: 10px; }
        #chat-box { height: 300px; border: 1px solid #444; overflow-y: auto; margin-bottom: 10px; padding: 10px; }
        .input-area { display: flex; gap: 5px; }
        input { flex: 1; padding: 10px; background: #222; color: #fff; border: 1px solid #444; }
    </style>
</head>
<body>

    <h3>Chat Debugger</h3>
    <div id="debug-log">System: Waiting for initialization...</div>
    
    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Type here...">
        <button id="sendBtn" style="padding:10px; background:#2ecc71; border:none; color:white;">Send</button>
    </div>

<script type="module">
    // --- DEBUGGER FUNCTION ---
    function log(msg) {
        const d = document.getElementById('debug-log');
        d.innerHTML += "<br>> " + msg;
        d.scrollTop = d.scrollHeight;
    }

    // Capture errors and show them as iPad Alerts
    window.onerror = function(m, s, l) {
        alert("CRASH AT LINE " + l + ": " + m);
    };

    log("Starting Firebase...");

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhYmRfVmyM011-6dFsjalCFVGoYmIL-z4",
        authDomain: "privatearcadechat.firebaseapp.com",
        projectId: "privatearcadechat",
        storageBucket: "privatearcadechat.firebasestorage.app",
        messagingSenderId: "762409625215",
        appId: "1:762409625215:web:2f33f867309474f812c14a",
        measurementId: "G-EVPTTME7FD"
    };

    try {
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        log("Firebase Initialized.");

        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
        
        log("Connecting to Firestore...");
        onSnapshot(q, (snapshot) => {
            log("Connection Successful! " + snapshot.size + " messages found.");
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snapshot.forEach(doc => {
                const p = document.createElement('p');
                p.textContent = doc.data().user + ": " + doc.data().text;
                box.appendChild(p);
            });
        }, (error) => {
            log("FIRESTORE ERROR: " + error.message);
            alert("Firestore Error: " + error.message);
        });

        document.getElementById('sendBtn').onclick = async () => {
            const val = document.getElementById('msgInput').value;
            log("Attempting to send...");
            try {
                await addDoc(collection(db, "messages"), {
                    text: val,
                    user: localStorage.getItem('username') || "TestUser",
                    createdAt: serverTimestamp()
                });
                log("Message sent!");
                document.getElementById('msgInput').value = "";
            } catch(e) {
                log("SEND ERROR: " + e.message);
            }
        };

    } catch (e) {
        log("INIT ERROR: " + e.message);
        alert("Init Error: " + e.message);
    }
</script>
</body>
</html>
