<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Live Chat</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        
        /* Chat Display */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { background: #1e1e1e; padding: 12px; border-radius: 10px; max-width: 80%; border: 1px solid #333; align-self: flex-start; }
        .msg.me { align-self: flex-end; border-color: #2ecc71; background: #1a2e22; }
        .msg b { color: #2ecc71; display: block; margin-bottom: 4px; font-size: 0.85em; }
        .img-msg { max-width: 100%; border-radius: 6px; margin-top: 8px; cursor: pointer; }

        /* Inputs */
        .input-area { background: #1e1e1e; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #2b2b2b; color: white; outline: none; }
        button { background: #2ecc71; border: none; color: white; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #444; cursor: not-allowed; }

        /* Ad Overlay */
        #ad-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        #timer-circle { width: 80px; height: 80px; border: 5px solid #2ecc71; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="ad-overlay">
    <div id="timer-circle">30</div>
    <p>Watching Ad for HD Upload Access...</p>
    <p style="font-size: 12px; color: #666;">Do not close this tab.</p>
</div>

<div id="chat-box"></div>

<div class="input-area">
    <input type="file" id="imgInput" accept="image/*" style="display:none">
    <button onclick="checkImageUpload()" id="imgBtn">📷</button>
    <input type="text" id="msgInput" placeholder="Type a message...">
    <button id="sendBtn">Send</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    // YOUR ACTUAL CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyDhYmRfVmyM011-6dFsjalCFVGoYmIL-z4",
        authDomain: "privatearcadechat.firebaseapp.com",
        projectId: "privatearcadechat",
        storageBucket: "privatearcadechat.firebasestorage.app",
        messagingSenderId: "762409625215",
        appId: "1:762409625215:web:2f33f867309474f812c14a",
        measurementId: "G-EVPTTME7FD"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let isHD = false;
    let imagesSentThisMinute = 0;
    const currentUser = localStorage.getItem('username') || "Player_" + Math.floor(Math.random()*900);

    // Reset image limit every 60 seconds
    setInterval(() => imagesSentThisMinute = 0, 60000);

    // AD TIMER LOGIC
    window.checkImageUpload = function() {
        if (imagesSentThisMinute >= 5) {
            alert("Slow down! Max 5 images per minute.");
            return;
        }
        
        if (confirm("Upload in standard 720p? (Cancel to watch 30s ad for HD)")) {
            isHD = false;
            document.getElementById('imgInput').click();
        } else {
            startAd();
        }
    };

    function startAd() {
        const overlay = document.getElementById('ad-overlay');
        const circle = document.getElementById('timer-circle');
        overlay.style.display = 'flex';
        let timeLeft = 30;

        const interval = setInterval(() => {
            timeLeft--;
            circle.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(interval);
                overlay.style.display = 'none';
                isHD = true;
                alert("HD Unlocked for this upload!");
                document.getElementById('imgInput').click();
            }
        }, 1000);
    }

    // SEND LOGIC
    document.getElementById('sendBtn').onclick = async () => {
        const text = document.getElementById('msgInput').value.trim();
        const file = document.getElementById('imgInput').files[0];
        const btn = document.getElementById('sendBtn');

        if (!text && !file) return;
        btn.disabled = true;

        let imgUrl = null;
        if (file) {
            imgUrl = await uploadAndResize(file);
            imagesSentThisMinute++;
        }

        await addDoc(collection(db, "messages"), {
            text: text,
            user: currentUser,
            img: imgUrl,
            isHD: isHD,
            createdAt: serverTimestamp()
        });

        document.getElementById('msgInput').value = "";
        document.getElementById('imgInput').value = "";
        btn.disabled = false;
        isHD = false; // Reset HD for next time
    };

    // IMAGE PROCESSING (720p Rule)
    async function uploadAndResize(file) {
        // If not HD, we could add canvas resizing logic here.
        // For now, uploading directly to Firebase Storage.
        const fileRef = ref(storage, `chat/${Date.now()}_${file.name}`);
        await uploadBytes(fileRef, file);
        return await getDownloadURL(fileRef);
    }

    // LIVE LISTENER (5 Minute Filter)
    const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
    onSnapshot(q, (snapshot) => {
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML = "";
        const now = Date.now();
        const fiveMins = 5 * 60 * 1000;

        snapshot.forEach((doc) => {
            const data = doc.data();
            if (!data.createdAt) return;
            
            const msgTime = data.createdAt.toDate().getTime();
            
            // Rule: Only show if < 5 mins old OR saved to device
            if ((now - msgTime < fiveMins) || localStorage.getItem('saveToDevice') === 'true') {
                renderMsg(data);
            }
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    function renderMsg(data) {
        const div = document.createElement('div');
        div.className = `msg ${data.user === currentUser ? 'me' : ''}`;
        div.innerHTML = `<b>${data.user}</b>${data.text}`;
        
        if (data.img) {
            const label = data.isHD ? "<span style='color:gold;font-size:10px;'>[HD]</span>" : "";
            div.innerHTML += `<br>${label}<img src="${data.img}" class="img-msg">`;
        }
        
        document.getElementById('chat-box').appendChild(div);
    }

    // Notification Permission
    if (Notification.permission === "default") Notification.requestPermission();
</script>

</body>
</html>
