<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub - Live Chat</title>
    <style>
        body { background: #121212; color: white; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; }
        
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .chat-section { flex: 3; display: flex; flex-direction: column; position: relative; border-right: 4px solid #1e1e1e; }
        
        /* Header styling from your sketch */
        .chat-header { background: #000; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; }
        .chat-header h1 { margin: 0; font-size: 36px; letter-spacing: 2px; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%; }
        
        .sidebar { flex: 1; background: #000; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .sidebar h2 { font-size: 20px; margin-bottom: 15px; color: #fff; border-bottom: 2px solid #2ecc71; width: 100%; text-align: center; padding-bottom: 5px; }
        
        /* Sidebar Room Cards */
        #room-list { width: 100%; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .room-card { background: #1a1a1a; border: 1px solid #444; border-radius: 4px; padding: 10px; width: 90%; }
        .room-card h4 { margin: 0 0 5px 0; color: #2ecc71; font-size: 14px; }
        .open-btn { background: #a30000; color: white; border: none; padding: 4px 8px; border-radius: 2px; font-weight: bold; cursor: pointer; float: right; font-size: 10px; }

        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #222; }
        .msg { background: #1a1a1a; padding: 12px; border-radius: 4px; max-width: 80%; border-left: 4px solid #444; }
        .msg.me { align-self: flex-end; border-left: none; border-right: 4px solid #2ecc71; }
        .msg b { color: #2ecc71; font-size: 0.9em; display: block; margin-bottom: 5px; }
        .del-btn { color: #e74c3c; font-size: 14px; cursor: pointer; float: right; }

        /* Input Area */
        .bottom-bar { background: #000; padding: 20px; display: flex; gap: 10px; align-items: center; border-top: 3px solid #1a1a1a; }
        .input-wrap { flex: 1; background: #1a1a1a; border: 2px solid #333; border-radius: 4px; display: flex; align-items: center; padding: 2px 10px; }
        input[type="text"] { flex: 1; background: transparent; border: none; color: white; padding: 10px; font-size: 16px; outline: none; font-family: inherit; }
        
        .send-btn { background: #006400; color: white; border: 2px solid #004d00; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .exit-link { color: #444; font-size: 10px; text-decoration: none; margin-left: 5px; }

        /* Modal */
        #settings-modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#111; padding:25px; border:2px solid #2ecc71; z-index:1000; text-align: center; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="chat-section">
        <div class="chat-header">
            <span style="font-size: 35px; cursor: pointer; color: #555;" onclick="toggleSettings()">✱</span>
            <h1 id="room-display">Global Chat</h1>
            <a href="index.html" class="exit-link">EXIT</a>
        </div>

        <div id="chat-box"></div>

        <div class="bottom-bar">
            <span style="font-size: 28px; cursor: pointer; color: #2ecc71;" onclick="setupPrivateRoom()">✚</span>
            <span style="font-size: 28px; cursor: pointer; color: #3498db; margin-left: 10px;" onclick="document.getElementById('fileInput').click()">🌀</span>
            <input type="file" id="fileInput" style="display:none" onchange="sendFile()">
            
            <div class="input-wrap">
                <input type="text" id="msgInput" placeholder="Message...">
            </div>
            
            <button class="send-btn" onclick="sendMsg()">Send</button>
        </div>
    </div>

    <div class="sidebar">
        <h2>Private Chats</h2>
        <div id="room-list">
            </div>
        <button onclick="switchRoom('public')" style="margin-top: 15px; background: #333; color: white; border: none; padding: 5px 10px; cursor: pointer; font-size: 10px;">Return to Global</button>
    </div>
</div>

<div id="settings-modal">
    <h3>System Configuration</h3>
    <label style="font-size: 12px;"><input type="checkbox" id="save-local" onchange="updateSaveSetting()"> LOCAL CACHE (Bypass 5m Delete)</label><br><br>
    <button class="send-btn" onclick="toggleSettings()">CLOSE</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhYmRfVmyM011-6dFsjalCFVGoYmIL-z4",
        authDomain: "privatearcadechat.firebaseapp.com",
        projectId: "privatearcadechat",
        storageBucket: "privatearcadechat.firebasestorage.app",
        messagingSenderId: "762409625215",
        appId: "1:762409625215:web:2f33f867309474f812c14a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    const currentUser = localStorage.getItem('username') || "Guest";
    const isAdmin = (currentUser === "MasterAdmin");
    let currentRoom = "public";
    let allowedUsers = [];
    let knownRooms = JSON.parse(localStorage.getItem('knownRooms') || "[]");

    window.toggleSettings = () => {
        const modal = document.getElementById('settings-modal');
        modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
    };

    window.updateSaveSetting = () => {
        localStorage.setItem('downloadChat', document.getElementById('save-local').checked);
    };

    // --- ROOM MANAGEMENT ---
    window.setupPrivateRoom = () => {
        const room = prompt("Enter Room Name:");
        const users = prompt("Allowed Users (comma separated):");
        if (room && users) {
            const list = users.split(',').map(u => u.trim());
            const newRoom = { name: room, users: list };
            knownRooms.push(newRoom);
            localStorage.setItem('knownRooms', JSON.stringify(knownRooms));
            renderRoomList();
            switchRoom(room, list);
        }
    };

    window.switchRoom = (roomName, userList = []) => {
        currentRoom = roomName;
        allowedUsers = userList;
        document.getElementById('room-display').innerText = roomName === 'public' ? "Global Chat" : roomName;
        listenForMessages();
    };

    function renderRoomList() {
        const listDiv = document.getElementById('room-list');
        listDiv.innerHTML = "";
        knownRooms.forEach(room => {
            const div = document.createElement('div');
            div.className = "room-card";
            div.innerHTML = `<h4>${room.name}</h4><button class="open-btn" onclick="switchRoom('${room.name}', ${JSON.stringify(room.users)})">OPEN</button>`;
            listDiv.appendChild(div);
        });
    }

    // --- MESSAGING ---
    window.sendMsg = async () => {
        const text = document.getElementById('msgInput').value.trim();
        if (!text) return;
        await addDoc(collection(db, "messages"), { text, user: currentUser, room: currentRoom, allowed: allowedUsers, createdAt: serverTimestamp() });
        document.getElementById('msgInput').value = "";
    };

    window.deleteMsg = async (id) => {
        if (confirm("Delete from server?")) await deleteDoc(doc(db, "messages", id));
    };

    let unsubscribe;
    function listenForMessages() {
        if (unsubscribe) unsubscribe();
        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
        unsubscribe = onSnapshot(q, (snapshot) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            const now = Date.now();
            const fiveMinutes = 5 * 60 * 1000;
            const shouldDownload = localStorage.getItem('downloadChat') === 'true';

            snapshot.forEach(d => {
                const data = d.data();
                const msgTime = data.createdAt ? data.createdAt.toDate().getTime() : now;
                const isOld = (now - msgTime) > fiveMinutes;

                // Visibility logic
                const canSee = (data.room === currentRoom) || isAdmin;
                
                if (canSee) {
                    if (isOld && !shouldDownload) return;
                    const div = document.createElement('div');
                    div.className = `msg ${data.user === currentUser ? 'me' : ''}`;
                    const canDelete = (data.user === currentUser || isAdmin);
                    const delHtml = canDelete ? `<span class="del-btn" onclick="deleteMsg('${d.id}')">×</span>` : "";
                    div.innerHTML = `<b>${data.user} ${delHtml}</b>`;
                    if (data.text) div.innerHTML += `<span>${data.text}</span>`;
                    if (data.img) div.innerHTML += `<img src="${data.img}" style="max-width:100%; margin-top:5px; border-radius:2px;">`;
                    box.appendChild(div);
                }
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    renderRoomList();
    listenForMessages();
</script>
</body>
</html>
